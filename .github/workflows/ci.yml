name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build and run with docker-compose
      run: docker compose up -d --build

    - name: Wait for app
      run: sleep 10

    - name: Test API
      run: curl http://localhost:3000
