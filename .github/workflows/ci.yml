name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build ./app -t donation-app

    - name: Run container test
      run: docker run -d -p 3000:3000 donation-app

    - name: Test API
      run: |
        sleep 5
        curl http://localhost:3000
